<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca Filmes/Séries</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="img/snorlax.png" type="image/png">

</head>
<body>
    <header>
    <div class="brand">
        <img src="img/snorlax.png" alt="Logo" class="logo">
        <h1>Busca Filmes</h1>
    </div>
    <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Buscar filme ou série...">
        <button id="searchButton">Buscar</button>
    </div>
</header>
<main>
    <div class="hero">
        <h2>O que você quer assistir hoje?</h2>
        <p>Busque filmes e séries e descubra novidades</p>
    </div>
    <div class="section">
        <p class="section-title">Resultados</p>
        <div id="results"></div>
    </div>
</main>
    <script src="js/main.js"></script>
</body>
</html>
